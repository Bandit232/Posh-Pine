<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="200" height="167">
  <!-- POSH text with multicolors -->
  <text x="40" y="160" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#d63b31">P</text>
  <text x="140" y="160" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#2f59c6">O</text>
  <text x="240" y="160" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#42b72a">S</text>
  <text x="340" y="160" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#e2b319">H</text>
  
  <!-- Blue dot -->
  <circle cx="480" cy="140" r="15" fill="#2f59c6"/>
  
  <!-- PINE text with multicolors -->
  <text x="40" y="300" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#d63b31">P</text>
  <text x="140" y="300" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#2f59c6">I</text>
  <text x="200" y="300" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#42b72a">N</text>
  <text x="310" y="300" font-size="110" font-weight="900" font-family="Arial, sans-serif" fill="#e2b319">E</text>
  
  <!-- Decorative shirt line icons scattered around -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top right shirt -->
    <rect x="430" y="50" width="55" height="60" rx="8"/>
    <line x1="445" y1="110" x2="440" y2="150"/>
    <line x1="485" y1="110" x2="490" y2="150"/>
    
    <!-- Right side shirt -->
    <rect x="480" y="200" width="50" height="55" rx="7"/>
    <line x1="495" y1="255" x2="490" y2="290"/>
    <line x1="530" y1="255" x2="535" y2="290"/>
    
    <!-- Bottom left shirt -->
    <rect x="60" y="370" width="50" height="55" rx="7"/>
    <line x1="75" y1="425" x2="70" y2="460"/>
    <line x1="110" y1="425" x2="115" y2="460"/>
    
    <!-- Middle left shirt -->
    <rect x="20" y="250" width="48" height="52" rx="7"/>
    <line x1="34" y1="302" x2="30" y2="335"/>
    <line x1="68" y1="302" x2="72" y2="335"/>
  </g>
</svg>